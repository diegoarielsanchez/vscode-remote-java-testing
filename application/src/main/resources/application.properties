service.message=Hello, World
server.port=8085
spring.profiles.active=dev

# OWASP Security Configurations
# Server Configuration
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Spring Security
# Non-dev credentials must be provided via environment variables or secure config source.
app.security.user.name=${APP_SECURITY_USER_NAME:}
app.security.user.password-hash=${APP_SECURITY_USER_PASSWORD_HASH:}
app.security.user.roles=${APP_SECURITY_USER_ROLES:USER}

# Actuator Security (only expose necessary endpoints)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true

# Database Configuration
# For production, set useSSL=true&requireSSL=true and provide credentials via secure config source.
spring.datasource.mysql.url=jdbc:mysql://445ed93b882f:3306/medsales?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.mysql.username=${DB_USERNAME}
spring.datasource.mysql.password=${DB_PASSWORD}
spring.datasource.mysql.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.postgres.url=${POSTGRES_URL}
spring.datasource.postgres.username=${POSTGRES_USERNAME}
spring.datasource.postgres.password=${POSTGRES_PASSWORD}
spring.datasource.postgres.driver-class-name=org.postgresql.Driver

# Logging Security
logging.level.org.springframework.security=INFO
logging.level.com.das.cleanddd=INFO

# Session Management
server.servlet.session.timeout=15m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Content Security Policy (can be added via headers in SecurityConfig)
# security.headers.content-security-policy=script-src 'self'; object-src 'none'

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000